services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: deploy/docker/backend.Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      FRONTEND_URL: http://localhost:4200
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ../..
      dockerfile: deploy/docker/frontend.Dockerfile
    ports:
      - "4200:4000"
    environment:
      NODE_ENV: production
      PORT: "4000"
    depends_on:
      - api
