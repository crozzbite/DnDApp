# Service — stable network endpoint for pods (compose equivalent: api service name + port mapping)
# Provides DNS name "api" inside namespace dnd-dev; load-balances if replicas > 1
apiVersion: v1
kind: Service
metadata:
  name: api                   # DNS: api.dnd-dev.svc.cluster.local (short name: api)
  namespace: dnd-dev
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: dndapp
spec:
  type: ClusterIP             # Internal cluster IP only; use kubectl port-forward for localhost access
  selector:
    app.kubernetes.io/name: api   # Routes traffic to pods with this label (links to Deployment)
  ports:
    - name: http
      port: 3000              # Port exposed by the Service (what port-forward and other pods use)
      targetPort: 3000        # Port on the pod container (containerPort in Deployment)
