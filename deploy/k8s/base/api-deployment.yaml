# Deployment — "keep N copies of this container running" (compose equivalent: api service)
# Owns the pod lifecycle: image, env, probes, restarts
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: dnd-dev
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: dndapp
spec:
  replicas: 1                 # How many api pods to run (scale to 2+ in prod for HA)
  selector:
    matchLabels:
      app.kubernetes.io/name: api   # Deployment manages pods with this label
  template:                   # Pod blueprint — each replica is created from this spec
    metadata:
      labels:
        app.kubernetes.io/name: api   # Must match selector.matchLabels
    spec:
      containers:
        - name: api
          image: dndapp-api:local     # Local image (Phase 1); GHCR tag in Phase 2
          imagePullPolicy: IfNotPresent  # Use image on kind node; skip Docker Hub pull
          ports:
            - containerPort: 3000       # Port the NestJS process listens on inside the pod
              name: http
          envFrom:
            - configMapRef:
                name: api-config        # Load all keys from ConfigMap as environment variables
          readinessProbe:
            # Pod receives traffic only when this passes (Phase 0 lesson: validates Redis, not just /health)
            exec:
              command:
                - node
                - -e
                - "require('net').connect({port:Number(process.env.REDIS_PORT||6379),host:process.env.REDIS_HOST||'redis'},function(){this.end();process.exit(0)}).on('error',()=>process.exit(1))"
            initialDelaySeconds: 10     # Wait before first check (app + Redis startup)
            periodSeconds: 10           # Re-check interval
          livenessProbe:
            # If this fails, kubelet restarts the container (app process dead/hung)
            httpGet:
              path: /health             # NestJS health route (does NOT check Redis by design)
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
