# Deployment — Angular 19 SSR (npm ci image → node server.mjs)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  namespace: dnd-dev
  labels:
    app.kubernetes.io/name: web
    app.kubernetes.io/part-of: dndapp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: web
          image: ghcr.io/crozzbite/dndapp-web@sha256:b4733fe5cca586a465289d1d436f95af74c72384c5ba804812a9db5a59a849d8  # Phase 2: GHCR pinned by digest (immutable, tamper-evident)
          imagePullPolicy: Always
          ports:
            - containerPort: 4000
              name: http
          envFrom:
            - configMapRef:
                name: web-config
          readinessProbe:
            # httpGet /health — Express route (not Angular SSR); see frontend/src/server.ts
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4000
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5