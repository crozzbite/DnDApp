<div class="filters-navar">
  <p>dashboard works!</p>
  @if (dnDService.dndclass(); as data) {
  <ul>
    @for (item of data.results; track item.index) {
    <li>
      {{ item.name }}
      @if (navbarState.filterState() === 'spells') {
      <span>LVL- {{ item.level }}</span>
      <br>
      }
      <a [href]="item.url" target="_blank">go to link</a>
    </li>
    }
  </ul>
  }
</div>
