# DnDApp — CD Build v1 (Phase 4 Step D)
# Build Docker images + push to GHCR. Sin deploy AKS (Step E).

name: DnDApp CD Build

# CUÁNDO corre: después de que DnDApp CI termine en verde (push a master)
on:
  workflow_run:
    workflows: ["DnDApp CI"]
    types: [completed]

permissions:
  contents: read
  packages: write

concurrency:
  group: dndapp-cd-build-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

env:
  GHCR_API_PACKAGE: ${{ vars.GHCR_API_PACKAGE }}
  GHCR_WEB_PACKAGE: ${{ vars.GHCR_WEB_PACKAGE }}

jobs:
  build-and-push:
    name: Build + push GHCR (api + web)
    # Solo merge/push a master con CI exitoso — no PRs ni runs fallidos
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'master' &&
      github.event.workflow_run.event == 'push' &&
      !contains(github.event.workflow_run.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout commit from CI run
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Set image tag (short SHA)
        id: tag
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/backend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.GHCR_API_PACKAGE }}:${{ steps.tag.outputs.short }}
          labels: |
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Build and push Web image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: deploy/docker/frontend.Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.GHCR_WEB_PACKAGE }}:${{ steps.tag.outputs.short }}
          labels: |
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Summary
        run: |
          echo "### Images pushed" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ github.repository_owner }}/${{ env.GHCR_API_PACKAGE }}:${{ steps.tag.outputs.short }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`ghcr.io/${{ github.repository_owner }}/${{ env.GHCR_WEB_PACKAGE }}:${{ steps.tag.outputs.short }}\`" >> "$GITHUB_STEP_SUMMARY"

  # JD P0: skipped build-and-push must fail the workflow (GitHub marks all-skipped as Success)
  require-build:
    name: Require successful build
    needs: build-and-push
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Fail if build-and-push did not succeed
        if: needs.build-and-push.result != 'success'
        run: |
          echo "build-and-push result: ${{ needs.build-and-push.result }}"
          exit 1
